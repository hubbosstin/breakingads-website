name: Deploy to Netlify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Netlify
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "*.github*" \
            --exclude "*.DS_Store" \
            --exclude "deploy.zip"
          
          RESPONSE=$(curl -s -X POST \
            "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip)
          
          DEPLOY_ID=$(echo "$RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin).get('id',''))")
          echo "Deploy ID: $DEPLOY_ID"
          
          # Poll until ready
          for i in $(seq 1 20); do
            sleep 6
            STATE=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
              "https://api.netlify.com/api/v1/deploys/$DEPLOY_ID" | \
              python3 -c "import json,sys; print(json.load(sys.stdin).get('state',''))")
            echo "[$i] $STATE"
            if [ "$STATE" = "ready" ]; then
              echo "Deploy live: https://breakingads.agency"
              exit 0
            fi
            if [ "$STATE" = "error" ]; then
              echo "Deploy failed"
              exit 1
            fi
          done
